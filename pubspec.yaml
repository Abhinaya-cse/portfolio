name: abhinaya_portfolio
description: Abhinaya B - Flutter Portfolio App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  flutter_svg: ^2.0.9
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3
  font_awesome_flutter: ^10.6.0
  firebase_auth: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/avatar.jpg
